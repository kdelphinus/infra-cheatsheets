site_name: Infra Cheatsheets
site_url: https://kdelphinus.github.io/infra-cheatsheets/
repo_url: https://github.com/Kdelphinus/infra-cheatsheets/
edit_uri: edit/main/docs/

theme:
  name: material
  language: ko
  palette: 
    # 다크 모드/라이트 모드 자동 전환 버튼
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs        # 상단 탭 메뉴
    - navigation.sections    # 사이드바 섹션 구분
    - search.highlight       # 검색어 하이라이팅
    - content.code.copy      # 코드 복사 버튼 (필수!)

markdown_extensions:
  - toc:
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - admonition               # 참고/주의 박스 (!!! note)
  - pymdownx.details         # 접기/펼치기 기능
  - pymdownx.superfences     # 코드 블록 중첩 지원
  - pymdownx.highlight:      # 코드 하이라이팅
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:          # 아이콘 렌더링
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables                   # 마크다운 테이블 지원
  - attr_list            # HTML 속성 적용
  - md_in_html           # HTML 태그 안에 마크다운 사용

extra_css:
  - stylesheets/extra.css

plugins:
  - search    # 검색 기능 (기본값이지만 명시하는 것이 좋음)

